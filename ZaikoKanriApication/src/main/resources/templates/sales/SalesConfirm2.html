<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>登録内容確認</title>
    <link rel="stylesheet" th:href="@{/sales/SalesConfirm2.css}">
</head>

<body>

<div class="container">

    <h2>登録内容確認</h2>

    <div class="info-box">
        商品名: <span th:text="${product.productName}"></span><br>
        JANコード: <span th:text="${product.janCode}"></span><br>
        入荷数： <span th:text="${sales.salesQuantity}"></span><br>
        販売日： <span th:text="${sales.salesDate}"></span><br>
    </div>

    <form th:action="@{/sales/SalesSave}"
          th:object="${sales}"
          method="post"
          class="form-box">

        <input type="hidden" th:field="*{productId}" />
        <input type="hidden" th:field="*{salesQuantity}" />
        <input type="hidden" th:field="*{salesDate}" />

        <div class="button-area">
            <button type="submit">
                登録する
            </button>
        </div>

    </form>

    <form th:action="@{/sales/SalesConfirm}"
          th:object="${sales}"
          method="post">

        <input type="hidden" th:field="*{productId}" />
        <input type="hidden" th:field="*{salesQuantity}" />
        <input type="hidden" th:field="*{salesDate}" />

        <button type="submit">
            戻る
        </button>

    </form>

</div>

</body>
</html>
