<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>販売数処理修正検索</title>

    <!-- CSS読み込み -->
    <link rel="stylesheet" th:href="@{/sales/SalesEditSearch.css}">
</head>

<body>

<div class="container">

    <h1>販売数処理修正検索</h1>

    <div th:if="${errorMessage}" style="color:red; margin-bottom:10px;">
        <p th:text="${errorMessage}"></p>
    </div>

    <!-- ★ここ統一 -->
    <div class="button-area">
        <a th:href="@{/sales/SalesManagement}">
            <button type="button">
                戻る
            </button>
        </a>
    </div>

    <form th:action="@{/sales/SalesEdit}"
          method="post"
          class="form-box">

        <!-- ★label追加 -->
        <label>販売数ID</label>

        <input type="number"
               name="salesId"
               required>

        <div class="button-area">
            <button type="submit">
                検索
            </button>
        </div>

    </form>

</div>

</body>
</html>
