<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>販売処理削除確認</title>
    <link rel="stylesheet" th:href="@{/sales/SalesDeleteConfirm.css}">
</head>

<body>

<div class="container">

    <h1>販売処理削除確認</h1>
    
    <div th:if="${errorMessage}" style="color:red; margin-bottom:10px;">
        <p th:text="${errorMessage}"></p>
    </div>

    <div class="info-box">

        <!-- ★ID追加 -->
        <p>販売ID</p>
		<span th:text="${sales.id}"></span>
        <p>商品名</p>
		<span th:text="${product.productName}"></span>
        <p>販売数</p>
		<span th:text="${sales.salesQuantity}"></span>
        <p>販売日</p>
		<span th:text="${sales.salesDate}"></span>

    </div>

    <div class="button-area">

        <!-- ★削除確定（構造統一） -->
        <form th:action="@{/sales/SalesDeleteComplete}"
              th:object="${sales}"
              method="post">

            <input type="hidden" th:field="*{id}">
            <button type="submit">削除する</button>

        </form>

        <!-- ★戻る（GET統一） -->
        <form th:action="@{/sales/SalesDeleteSearch}"
              method="get">

            <button type="submit">戻る</button>

        </form>

    </div>

</div>

</body>
</html>
