<style>
body {
    background-color: #f3f3f3;

}

.container {

}

h1 {
    margin-bottom: 30px;
}

.form-box {
    display: flex;
    flex-direction: column;

}

.form-box select,
.form-box input {

    border: 1px solid #999;
    border-radius: 4px;

    border: 1px solid #999;
    background-color: #e6e6e6;

}

}
