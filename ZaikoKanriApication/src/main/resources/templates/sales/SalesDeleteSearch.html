<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>販売数削除検索</title>

    <!-- CSS読み込み -->
    <link rel="stylesheet" th:href="@{/sales/SalesDeleteSearch.css}">
</head>

<body>

<div class="container">

    <h1>販売数削除検索</h1>

    <!-- ★エラーメッセージ統一 -->
    <div th:if="${errorMessage}" style="color:red; margin-bottom:10px;">
        <p th:text="${errorMessage}"></p>
    </div>

    

    <!-- ★form構造統一 -->
    <form th:action="@{/sales/SalesDeleteConfirm}"
          method="post"
		  class="form-box">

        <div class="form-box">

            <!-- ★label追加 & 文言修正 -->
            <label>販売数IDを入力してください</label>
            <input type="number"
                   name="salesId"
                   required>

        </div>

        <div class="button-area">
            <button type="submit">
                検索
            </button>
        </div>
		
		<!-- ★戻るボタン統一 -->
		<div class="back-area">
		   <a th:href="@{/sales/SalesManagement}">
		      <button type="button">
		         戻る
		      </button>
		   </a>
		</div>

    </form>

</div>

</body>
</html>
