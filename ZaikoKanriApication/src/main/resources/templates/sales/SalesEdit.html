<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>販売数入力修正</title>

    <!-- CSS読み込み -->
    <link rel="stylesheet" th:href="@{/sales/SalesEdit.css}">
</head>

<body>

<div class="container">

    <h1>販売数入力修正</h1>
	
	<div th:if="${errorMessage}" style="color:red; text-align:center;">
	    <p th:text="${errorMessage}"></p>
	</div>

    <div class="back-area">
        <a th:href="@{/sales/SalesEditSearch}">
            <button type="button">
                戻る
            </button>
        </a>
    </div>

    <form th:action="@{/sales/SalesEditConfirm}"
          th:object="${sales}"
          method="post"
          class="form-box">

        <!-- ID -->
        <input type="text"
               th:field="*{id}"
               readonly>

        <!-- 商品 -->
		<label>商品名</label>
		<!-- 修正版（null 安全） -->
		<p th:text="${product != null} ? ${product.productName} : '商品情報なし'">商品名</p>
		
		<!-- hiddenで送信 -->
		<input type="hidden" th:field="*{productId}">
		
		<!-- 販売数 -->
		<label>販売数</label>
		<input type="number" th:field="*{salesQuantity}" min="1" required>
		
		<!-- 販売日 -->
		<label>販売日</label>
		<input type="date" th:field="*{salesDate}" required>

        <div class="button-area">
            <button type="submit">
                入荷数編集確認へ
            </button>
        </div>

    </form>

</div>

</body>
</html>
