<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>販売数入力修正</title>

    <!-- CSS読み込み -->
    <link rel="stylesheet" th:href="@{/sales/SalesEdit.css}">
</head>

<body>

<div class="container">

    <h1>販売数入力修正</h1>

    <div class="back-area">
        <a th:href="@{/sales/SalesEditSearch}">
            <button type="button">
                戻る
            </button>
        </a>
    </div>

    <form th:action="@{/sales/SalesEditConfirm}"
          th:object="${sales}"
          method="post"
          class="form-box">

        <!-- ID -->
        <input type="text"
               th:field="*{id}"
               readonly>

        <!-- 商品 -->
        <select th:field="*{productId}">
            <option th:each="product : ${productList}"
                    th:value="${product.id}"
                    th:text="${product.productName}">
            </option>
        </select>

        <!-- 販売数 -->
        <input type="text"
               th:field="*{salesQuantity}"
               placeholder="入荷数">

        <!-- 販売日 -->
        <input type="date"
               th:field="*{salesDate}">

        <div class="button-area">
            <button type="submit">
                入荷数編集確認へ
            </button>
        </div>

    </form>

</div>

</body>
</html>
