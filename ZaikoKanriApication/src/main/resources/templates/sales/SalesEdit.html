<style>
body {
    background-color: #dcdcdc;
    font-family: Arial, sans-serif;
}

.container {
    width: 500px;
    margin: 60px auto;
    text-align: left;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.back-area {
    margin-bottom: 15px;
}

.form-box {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.form-box input,
.form-box select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #888;
    font-size: 14px;
    box-sizing: border-box;
    background-color: #f7f7f7;
}

.button-area {
    margin-top: 15px;
}

button {
    padding: 8px 20px;
    border: 1px solid #888;
    background-color: #e6e6e6;
    cursor: pointer;
}

button:hover {
    background-color: #d0d0d0;
}
</style>

<div class="container">

    <h1>販売数入力修正</h1>

    <div class="back-area">
        <a th:href="@{/sales/SalesEditSearch}">
            <button type="button">戻る</button>
        </a>
    </div>

	<form th:action="@{/sales/SalesEditConfirm}"
	      th:object="${sales}"
	      method="post"
	      class="form-box">

	    <!-- ID -->
	    <input type="text" th:field="*{id}" readonly>

	    <!-- 商品 -->
		<select th:field="*{productId}">
		    <option th:each="product : ${productList}"
		            th:value="${product.id}"
		            th:text="${product.productName}">
		    </option>
		</select>

	    <!-- 販売数 -->
	    <input type="text" th:field="*{salesQuantity}" placeholder="入荷数">

	    <!-- 販売日 -->
	    <input type="date" th:field="*{salesDate}">

	    <div class="button-area">
	        <button type="submit">入荷数編集確認へ</button>
	    </div>

	</form>

</div>
