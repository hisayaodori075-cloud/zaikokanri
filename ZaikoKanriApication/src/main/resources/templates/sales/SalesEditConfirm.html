<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>販売数編集確認</title>
    <link rel="stylesheet" th:href="@{/sales/SalesEditConfirm.css}">
</head>

<body>

<div class="container">

    <h1>販売数編集確認</h1>

    <!-- ★th:objectをここに置く（超重要） -->
    <div class="form-box" th:object="${sales}">

        <!-- ID -->
        <p>販売数ID</p>
        <span th:text="*{id}"></span>
        <input type="hidden" th:field="*{id}">

        <!-- 商品名 -->
        <p>商品名</p>
        <span th:text="${product.productName}"></span>
        <input type="hidden" th:field="*{productId}">

        <!-- 販売数 -->
        <p>販売数</p>
        <span th:text="*{salesQuantity}"></span>
        <input type="hidden" th:field="*{salesQuantity}">

        <!-- 販売日 -->
        <p>販売日</p>
        <span th:text="*{salesDate}"></span>
        <input type="hidden" th:field="*{salesDate}">

    </div>

    <div class="button-area">

        <!-- 更新 -->
        <form th:action="@{/sales/SalesEditSave}" th:object="${sales}" method="post">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{productId}">
            <input type="hidden" th:field="*{salesQuantity}">
            <input type="hidden" th:field="*{salesDate}">
            <button type="submit">更新</button>
        </form>

        <!-- 戻る（GETで統一） -->
        <form th:action="@{/sales/SalesEditBack/{id}(id=${sales.id})}" method="get">
            <button type="submit">戻る</button>
        </form>

    </div>

</div>

</body>
</html>
