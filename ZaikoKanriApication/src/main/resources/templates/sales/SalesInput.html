<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>販売数入力</title>
    <link rel="stylesheet" th:href="@{/sales/SalesInput.css}">
</head>

<body>

<div class="container">

    <h1>販売数入力</h1>
	
	<div th:if="${errorMessage}" style="color:red; margin-bottom:10px;">
			<p th:text="${errorMessage}"></p>
	</div>

    <div class="product-info">
        <p>商品名</p>
		<span th:text="${product.productName}"></span>
        <p>JANコード</p>
		<span th:text="${product.janCode}"></span>
    </div>

    <form th:action="@{/sales/SalesConfirm}"
          th:object="${sales}"
          method="post"
          class="form-box">

        <input type="hidden" th:field="*{productId}" />

		<label>販売数</label>
		<input type="number"
               th:field="*{salesQuantity}"
			   min="1"
			   required/>
		
		<label>販売日</label>
        <input type="date"
               th:field="*{salesDate}" 
			   required/>

        <div class="button-area">
            <button type="submit">
                登録確認へ
            </button>
        </div>

    </form>

    <form th:action="@{/sales/SalesRegister}" method="get" class="back-area">
        <button type="submit">
            戻る
        </button>
    </form>

</div>

</body>
</html>
