<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>販売管理</title>

    <!-- CSS読み込み -->
    <link rel="stylesheet" th:href="@{/sales/SalesManagement.css}">
</head>

<body>

<div class="container">

    <h2>販売管理</h2>

    <div class="button-area">

        <!-- 販売数入力 -->
        <form th:action="@{/sales/SalesRegister}" method="get">
            <button type="submit">
                販売数入力
            </button>
        </form>

        <!-- 販売数編集 -->
        <form th:action="@{/sales/SalesEditSearch}" method="get">
            <button type="submit">
                販売数編集
            </button>
        </form>

        <!-- 販売数取消 -->
        <form th:action="@{/sales/SalesDeleteSearch}" method="get">
            <button type="submit">
                販売数取消
            </button>
        </form>
		
		<!-- 販売数取消 -->
		<form th:action="@{/sales/SalesList}" method="get">
		    <button type="submit">
		       販売数履歴
		    </button>
		</form>


        <!-- 在庫管理へ戻る -->
        <form th:action="@{/stock/ZaikoKanri}" method="get">
            <button type="submit">
                在庫管理へ戻る
            </button>
        </form>

    </div>

</div>

</body>
</html>
