<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>販売数登録</title>

    <!-- CSS読み込み -->
    <link rel="stylesheet" th:href="@{/sales/SalesRegister.css}">
</head>

<body>

<div class="container">

    <h1>販売数登録</h1>

    <p class="error-message"
       th:if="${errorMessage}"
       th:text="${errorMessage}">
    </p>

    <a th:href="@{/sales/SalesManagement}">
        <button type="button">
            戻る
        </button>
    </a>

    <h3>商品名またはJANコードを入力してください</h3>

    <form th:action="@{/sales/SalesRegister}"
          th:object="${sales}"
          method="post"
          class="form-box">

        <!-- 商品 -->
        <select th:field="*{productId}">
            <option value="">
                選択してください
            </option>

            <option th:each="product : ${productList}"
                    th:value="${product.id}"
                    th:text="${product.productName}">
            </option>
        </select>

        <!-- JANコード検索 -->
        <p>JANコード</p>

        <input type="text"
               name="janCode"
               placeholder="JANコードを入力">

        <div class="button-area">
            <button type="submit">
                検索
            </button>
        </div>

    </form>

</div>

</body>
</html>
