<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>商品検索</title>
    <link rel="stylesheet" th:href="@{/product/ProductSearch.css}">
</head>

<body>

<div class="container">

    <h1>商品検索</h1>
	
	<p th:if="${errorMessage}" th:text="${errorMessage}" style="color:red;"></p>

    <a th:href="@{/product/ProductMasterList}">
        <button type="button">
            戻る
        </button>
    </a>

    <form th:action="@{/product/ProductSearchConfirm}"
          th:object="${productSearchForm}"
          method="get">

        <div class="form-box">

            <input type="number"
                   th:field="*{janCode}"
                   placeholder="JANコード">

            <input type="text"
                   th:field="*{makerName}"
                   placeholder="メーカー名">

            <input type="text"
                   th:field="*{productName}"
                   placeholder="商品名">

            <input type="number"
                   th:field="*{PurchasePrice}"
                   placeholder="仕入価格">

            <input type="number"
                   th:field="*{price}"
                   placeholder="売価">

            <select name="salesStatus">

                <option value=""></option>
                <option value="販売中">販売中</option>
                <option value="販売停止">販売停止</option>
                <option value="販売終了">販売終了</option>

            </select>

        </div>

        <div class="button-area">

            <button type="submit">
                検索
            </button>

        </div>

    </form>

</div>

</body>
</html>
