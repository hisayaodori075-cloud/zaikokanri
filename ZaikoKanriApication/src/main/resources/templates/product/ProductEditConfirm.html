<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>商品編集確認</title>
    <link rel="stylesheet" th:href="@{/product/ProductEditConfirm.css}">
</head>

<body>

<div class="container">

    <h2>商品編集確認</h2>

    <!-- 確認表示 -->
    <div class="info-box">

        <p>JANコード: <span th:text="${product.janCode}"></span></p>
        <p>メーカー名: <span th:text="${product.makerName}"></span></p>
        <p>商品名: <span th:text="${product.productName}"></span></p>
        <p>仕入価格: <span th:text="${product.purchasePrice}"></span></p>
        <p>売価: <span th:text="${product.price}"></span></p>
        <p>販売状況: <span th:text="${product.salesStatus}"></span></p>

    </div>

    <div class="button-area">

        <!-- 戻る -->
        <form th:action="@{/product/ProductEdit/{id}(id=${product.id})}"
              method="get">

            <button type="submit" class="btn-back">
                編集画面に戻る
            </button>

        </form>

        <!-- 保存 -->
        <form th:action="@{/product/ProductEditComplete}"
              method="post"
              th:object="${product}">

            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{janCode}">
            <input type="hidden" th:field="*{makerName}">
            <input type="hidden" th:field="*{productName}">
            <input type="hidden" th:field="*{purchasePrice}">
            <input type="hidden" th:field="*{price}">
            <input type="hidden" th:field="*{salesStatus}">

            <button type="submit" class="btn-confirm">
                登録する
            </button>

        </form>

    </div>

</div>

</body>
</html>
