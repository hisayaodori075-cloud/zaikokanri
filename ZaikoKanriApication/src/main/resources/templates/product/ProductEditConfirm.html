<style>
body {
    background-color: #dcdcdc;
    font-family: Arial, sans-serif;
}

.container {
    width: 500px;
    margin: 60px auto;
    text-align: left;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.back-area {
    margin-bottom: 15px;
}

.form-box {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.form-box input,
.form-box select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #888;
    font-size: 14px;
    box-sizing: border-box;
    background-color: #f7f7f7;
}

.button-area {
    margin-top: 15px;
}

button {
    padding: 8px 20px;
    border: 1px solid #888;
    background-color: #e6e6e6;
    cursor: pointer;
}

button:hover {
    background-color: #d0d0d0;
}
</style>

<div class="container">

    <h1>商品編集確認</h1>

    <div class="back-area">
		<a th:href="@{/product/ProductEdit/{id}(id=${product.id})}">
            <button type="button">編集画面に戻る</button>
        </a>
    </div>

	JANコード: <span th:text="${product.janCode}"></span><br>
	メーカー名: <span th:text="${product.makerName}"></span><br>
	商品名: <span th:text="${product.ProductName}"></span><br>
    仕入価格: <span th:text="${product.PurchasePrice}"></span><br>
	売価: <span th:text="${product.price}"></span><br>
    販売状況: <span th:text="${product.salesStatus}"></span><br>

	
	<form th:action="@{/product/ProductEditComplete}"
          method="post"
          th:object="${product}"
          class="form-box">
		  
		
        <!-- ★ 更新に必須 -->
        <input type="hidden" th:field="*{id}" />

        <input type="hidden" th:field="*{janCode}"/>
		
		<input type="hidden" th:field="*{makerName}"/>
		
		<input type="hidden" th:field="*{productName}"/>
		
		<input type="hidden" th:field="*{PurchasePrice}"/>
		
		<input type="hidden" th:field="*{price}"/>

		<input type="hidden" th:field="*{salesStatus}" />

        <div class="button-area">
            <button type="submit">登録する</button>
        </div>

    </form>

</div>
