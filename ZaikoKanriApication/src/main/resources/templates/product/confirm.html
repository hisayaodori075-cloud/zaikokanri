<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>商品マスタ登録確認</title>
    <link rel="stylesheet" th:href="@{/product/confirm.css}">
</head>

<body>

<div class="container">

    <h1>商品マスタ登録確認</h1>
	
	<div th:if="${error}" style="color:red; margin-bottom:10px;">
		<p th:text="${error}"></p>
	</div>

    <div class="info-box">

        <p>JANコード</p>
		<span th:text="${product.janCode}"></span>
        <p>メーカー名</p>
		<span th:text="${product.makerName}"></span>
        <p>商品名</p>
		<span th:text="${product.productName}"></span>
        <p>仕入価格</p>
		<span th:text="${product.purchasePrice}"></span>
        <p>売価</p>
		<span th:text="${product.price}"></span>
        <p>販売状況</p>
		<span th:text="${product.salesStatus}"></span>

    </div>

    <div class="button-area">

        

        <!-- 登録 -->
        <form th:action="@{/product/save}"
              th:object="${product}"
              method="post">

            <input type="hidden" th:field="*{janCode}" />
            <input type="hidden" th:field="*{makerName}" />
            <input type="hidden" th:field="*{productName}" />
            <input type="hidden" th:field="*{purchasePrice}" />
            <input type="hidden" th:field="*{price}" />
            <input type="hidden" th:field="*{salesStatus}" />

            <button type="submit" class="btn-confirm">
                登録する
            </button>

        </form>
		
		<!-- 戻る -->
		<form th:action="@{/product/back}"
		      th:object="${product}"
		      method="post">

		    <input type="hidden" th:field="*{janCode}" />
		    <input type="hidden" th:field="*{makerName}" />
		    <input type="hidden" th:field="*{productName}" />
		    <input type="hidden" th:field="*{purchasePrice}" />
		    <input type="hidden" th:field="*{price}" />
		    <input type="hidden" th:field="*{salesStatus}" />

		    <button type="submit" class="btn-back">
		        戻る
		    </button>

		</form>

    </div>

</div>

</body>
</html>
