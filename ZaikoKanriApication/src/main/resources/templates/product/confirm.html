<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>登録内容確認</title>
    <link rel="stylesheet" th:href="@{/product/confirm.css}">
</head>

<body>

<div class="confirm-card">
	
	<h2>登録内容確認</h2>

    <table class="confirm-table">
        <tr>
            <th>JANコード</th>
            <td th:text="${product.janCode}"></td>
        </tr>

        <tr>
            <th>メーカー名</th>
            <td th:text="${product.makerName}"></td>
        </tr>

        <tr>
            <th>商品名</th>
            <td th:text="${product.productName}"></td>
        </tr>

        <tr>
            <th>仕入価格</th>
            <td th:text="${product.PurchasePrice}"></td>
        </tr>

        <tr>
            <th>売価</th>
            <td th:text="${product.price}"></td>
        </tr>

        <tr>
            <th>販売状況</th>
            <td th:text="${product.salesStatus}"></td>
        </tr>
    </table>

    <!-- 保存フォーム -->
    <form th:action="@{/product/save}"
          th:object="${product}"
          method="post">

        <input type="hidden" th:field="*{janCode}" />
        <input type="hidden" th:field="*{makerName}" />
        <input type="hidden" th:field="*{productName}" />
        <input type="hidden" th:field="*{PurchasePrice}" />
        <input type="hidden" th:field="*{price}" />
        <input type="hidden" th:field="*{salesStatus}" />

        <div class="confirm-actions">

            <button type="button"
                    class="btn-back"
                    onclick="location.href='/product/newproduct'">
                戻る
            </button>

            <button type="submit"
                    class="btn-confirm">
                登録する
            </button>

        </div>

    </form>

</div>

</body>
</html>
