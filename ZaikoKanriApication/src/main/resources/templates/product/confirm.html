<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>登録内容確認</title>
    <link rel="stylesheet" th:href="@{/product/confirm.css}">
</head>

<body>

<div class="container">

    <h2>登録内容確認</h2>

    <div class="confirm-info">
        JANコード:
        <span th:text="${product.janCode}"></span><br>

        メーカー名:
        <span th:text="${product.makerName}"></span><br>

        商品名:
        <span th:text="${product.productName}"></span><br>

        仕入価格:
        <span th:text="${product.PurchasePrice}"></span><br>

        売価:
        <span th:text="${product.price}"></span><br>

        販売状況:
        <span th:text="${product.salesStatus}"></span><br>
    </div>

    <form th:action="@{/product/save}"
          th:object="${product}"
          method="post">

        <input type="hidden" th:field="*{janCode}" />
        <input type="hidden" th:field="*{makerName}" />
        <input type="hidden" th:field="*{productName}" />
        <input type="hidden" th:field="*{PurchasePrice}" />
        <input type="hidden" th:field="*{price}" />
        <input type="hidden" th:field="*{salesStatus}" />

        <button type="submit">
            登録する
        </button>

    </form>

    <form th:action="@{/product/newproduct}" method="get">
        <button type="submit">
            戻る
        </button>
    </form>

</div>

</body>
</html>
