<style>
body {
    background-color: #dcdcdc;
    font-family: Arial, sans-serif;
}

.container {
    width: 500px;
    margin: 60px auto;
    text-align: left;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.back-area {
    margin-bottom: 15px;
}

.form-box {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.form-box input,
.form-box select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #888;
    font-size: 14px;
    box-sizing: border-box;
    background-color: #f7f7f7;
}

.button-area {
    margin-top: 15px;
}

button {
    padding: 8px 20px;
    border: 1px solid #888;
    background-color: #e6e6e6;
    cursor: pointer;
}

button:hover {
    background-color: #d0d0d0;
}
</style>

<div class="container">

    <h1>商品編集</h1>

    <div class="back-area">
        <a th:href="@{/product/ProductMasterList}">
            <button type="button">戻る</button>
        </a>
    </div>

    <form th:action="@{/product/ProductEdit/{id}}"
          method="post"
          th:object="${product}"
          class="form-box">

        <!-- ★ 更新に必須 -->
        <input type="hidden" th:field="*{id}" />

        <input type="text" th:field="*{janCode}" placeholder="JANコード">

        <input type="text" th:field="*{makerName}" placeholder="メーカー名">

        <input type="text" th:field="*{productName}" placeholder="商品名">

        <input type="text" th:field="*{PurchasePrice}" placeholder="仕入価格">

        <input type="text" th:field="*{price}" placeholder="売価">

        <select th:field="*{salesStatus}">
            <option value="販売中">販売中</option>
            <option value="販売停止">販売停止</option>
        </select>

        <div class="button-area">
            <button type="submit">商品編集確認へ</button>
        </div>

    </form>

</div>
