<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>商品マスタ編集</title>
    <link rel="stylesheet" th:href="@{/product/ProductEdit.css}">
</head>

<body>

<div class="container">

    <!-- 入力カード -->
    <form th:action="@{/product/ProductEdit/{id}(id=${product.id})}"
          method="post"
          th:object="${product}"
          class="form-card">

        <h1>商品マスタ編集</h1>
		
		<!-- エラーメッセージ -->
		<div th:if="${error}" style="color:red; margin-bottom:10px;">
			<p th:text="${error}"></p>
		</div>

        <input type="hidden" th:field="*{id}">

        <label>JANコード</label>
		<input type="text"
				       th:field="*{janCode}"
				       pattern="\d{8}|\d{13}"
				       maxlength="13"
				       required
				       title="JANコードは8桁または13桁の数字で入力してください">

        <label>メーカー名</label>
        <input type="text" th:field="*{makerName}" required>

        <label>商品名</label>
        <input type="text" th:field="*{productName}" required>

        <label>仕入価格</label>
        <input type="number"
               th:field="*{purchasePrice}"
               min="0"
               required>

        <label>売価</label>
        <input type="number"
               th:field="*{price}"
               min="0"
               required>

        <label>ステータス</label>
        <select th:field="*{salesStatus}">
            <option value="販売中">販売中</option>
            <option value="販売停止">販売停止</option>
            <option value="販売終了">販売終了</option>
        </select>

        <!-- ボタンエリア（横並び） -->
        <div class="form-actions">

            <button type="button"
                    class="btn-back"
                    onclick="location.href='/product/ProductMasterList'">
                戻る
            </button>

            <button type="submit" class="btn-confirm">
                編集確認へ
            </button>

        </div>

    </form>

</div>

</body>
</html>
