<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>商品編集</title>
    <link rel="stylesheet" th:href="@{/product/ProductEdit.css}">
</head>

<body>

<div class="container">

    <h1>商品編集</h1>

    <div class="back-area">
        <a th:href="@{/product/ProductMasterList}">
            <button type="button">
                戻る
            </button>
        </a>
    </div>

    <form th:action="@{/product/ProductEdit/{id}}"
          method="post"
          th:object="${product}"
          class="form-box">

        <!-- 更新に必須 -->
        <input type="hidden" th:field="*{id}">

        <input type="text"
               th:field="*{janCode}"
               placeholder="JANコード">

        <input type="text"
               th:field="*{makerName}"
               placeholder="メーカー名">

        <input type="text"
               th:field="*{productName}"
               placeholder="商品名">

        <input type="text"
               th:field="*{PurchasePrice}"
               placeholder="仕入価格">

        <input type="text"
               th:field="*{price}"
               placeholder="売価">

        <select th:field="*{salesStatus}">
            <option value="販売中">販売中</option>
            <option value="販売停止">販売停止</option>
        </select>

        <div class="button-area">

            <button type="submit">
                商品編集確認へ
            </button>

        </div>

    </form>

</div>

</body>
</html>
