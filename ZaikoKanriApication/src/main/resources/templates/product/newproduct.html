<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>商品新規登録</title>
    <link rel="stylesheet" th:href="@{/product/newproduct.css}">
</head>

<body>

    <!-- 商品登録フォーム -->
    <form class="form-card"
		  th:action="@{/product/confirm}"
          th:object="${product}"
          method="post">
		  
		  <h2>商品新規登録</h2>

        <input type="number"
               th:field="*{janCode}"
               placeholder="JANコード"
               required>

        <input type="text"
               th:field="*{makerName}"
               placeholder="メーカー名"
               required>

        <input type="text"
               th:field="*{productName}"
               placeholder="商品名"
               required>

        <input type="number"
               th:field="*{PurchasePrice}"
               placeholder="仕入価格"
               required>

        <input type="number"
               th:field="*{price}"
               placeholder="売価"
               required>

        <select name="salesStatus">

            <option value="ステータス変更指示"
                    disabled
                    hidden>
                ステータスを選択してください
            </option>

            <option value="販売中">販売中</option>
            <option value="販売停止">販売停止</option>
            <option value="販売終了">販売終了</option>

        </select>

		<div class="form-actions">

		        <button type="button"
		                class="btn-back"
		                onclick="location.href='/product/ProductMasterList'">
		            戻る
		        </button>

		        <button type="submit" class="btn-confirm">
		            確認へ
		        </button>

		 </div>

    </form>

</body>
</html>
