<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>発注最低数アラート設定一覧</title>
    <link rel="stylesheet" th:href="@{/alert/AlertSettingList.css}">
</head>

<body>

<div class="container">

    <h1>発注最低数アラート設定</h1>

    <!-- 戻る（入荷と統一） -->
    <div class="back-area">
        <a th:href="@{/alert/AlertSetting}">
            <button type="button">戻る</button>
        </a>
    </div>

    <!-- エラーメッセージ -->
    <div th:if="${errorMessage}" style="color:red; margin-bottom:10px;">
        <p th:text="${errorMessage}"></p>
    </div>

    <!-- 検索フォーム（入荷と同形式） -->
    <form th:action="@{/alert/AlertSettingList}" method="get" class="search-form">

        <label>商品名</label>
        <select name="productName">
            <option value="">商品名を選択してください</option>

            <option th:each="product : ${allProducts}"
                    th:value="${product.productName}"
                    th:text="${product.productName}">
            </option>
        </select>

        <label>JANコード</label>
        <input type="text" name="janCode">

        <div class="button-area">
            <button type="submit">検索</button>

            <button type="button"
                    onclick="location.href='/alert/AlertSettingList'">
                一覧
            </button>
        </div>

    </form>

    <!-- 商品一覧（入荷と同じテーブル構造） -->
    <table class="product-table">

        <thead>
            <tr>
                <th>商品ID</th>
                <th>商品名</th>
                <th>JANコード</th>
                <th>在庫数</th>
                <th>発注最低数</th>
                <th>操作</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="product : ${productList}">

                <td th:text="${product.id}"></td>

                <td th:text="${product.productName}"></td>

                <td th:text="${product.janCode}"></td>

                <td th:text="${product.stock}"></td>

                <td th:text="${alertMap[product.id]?.minStock ?: '未設定'}"></td>

                <td>

                    <a th:href="@{/alert/AlertSettingRegister/{id}(id=${product.id})}">

                        <button type="button">

                            <span th:text="${alertMap[product.id] != null ? '最低数更新' : '最低数登録'}">
                            </span>

                        </button>

                    </a>

                </td>

            </tr>

        </tbody>

    </table>

</div>

</body>
</html>
