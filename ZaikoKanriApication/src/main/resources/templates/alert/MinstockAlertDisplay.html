<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>発注最低数アラート</title>

<style>

body{
    background-color:#f5f5f5;
    font-family:Arial, sans-serif;
}

.container{
    width:1000px;
    margin:50px auto;
    text-align:center;
}

.title{
    font-size:28px;
    border:2px solid #2c4c57;
    display:inline-block;
    padding:10px 30px;
    margin-bottom:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background-color:#e0e0e0;
}

.button-area{
    margin-top:40px;
}

button{
    width:250px;
    height:60px;
    font-size:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
発注最低数アラート
</div>

<table>

<thead>
<tr>
    <th>商品名</th>
    <th>現在庫数</th>
    <th>発注最低数</th>
    <th>不足数</th>
    <th>ステータス</th>
</tr>
</thead>

<tbody>

<tr th:each="product : ${minStockAlertList}">

    <td th:text="${product.productName}"></td>

    <!-- stockがnullなら0表示 -->
    <td th:text="${product.stock != null ? product.stock : 0}"></td>

    <td th:text="${alertMap[product.id].minStock}"></td>

    <!-- 不足数 -->
    <td th:text="${alertMap[product.id].minStock - (product.stock != null ? product.stock : 0)}"></td>

    <td>緊急</td>

</tr>

</tbody>

</table>

<div class="button-area">

<a th:href="@{/alert/AlertScreen}">
<button>戻る</button>
</a>

</div>

</div>

</body>
</html>
