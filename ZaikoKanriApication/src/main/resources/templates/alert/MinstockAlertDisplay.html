<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>発注最低数アラート</title>
    <link rel="stylesheet" th:href="@{/alert/MinStockAlertDisplay.css}">
</head>

<body>

    <div class="container">

        <div class="title">
            発注最低数アラート
        </div>

        <table>

            <thead>
                <tr>
                    <th>商品名</th>
                    <th>現在庫数</th>
                    <th>発注最低数</th>
                    <th>不足数</th>
                    <th>ステータス</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="product : ${minStockAlertList}">

                    <td th:text="${product.productName}"></td>

                    <!-- stockがnullなら0表示 -->
                    <td th:text="${product.stock != null ? product.stock : 0}"></td>

                    <td th:text="${alertMap[product.id].minStock}"></td>

                    <!-- 不足数 -->
                    <td th:text="${alertMap[product.id].minStock - (product.stock != null ? product.stock : 0)}"></td>

                    <td>
                        緊急
                    </td>

                </tr>

            </tbody>

        </table>

        <div class="button-area">

            <a th:href="@{/alert/AlertScreen}">
                <button>
                    戻る
                </button>
            </a>

        </div>

    </div>

</body>
</html>
