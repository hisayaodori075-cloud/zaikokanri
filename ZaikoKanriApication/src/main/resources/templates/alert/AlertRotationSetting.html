<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>回転数アラート設定</title>
	<link rel="stylesheet" th:href="@{/alert/AlertRotationSetting.css}">
</head>

<body>

    <div class="container">

        <h1>回転数アラート設定</h1>
		
		<div th:if="${error}" style="color:red; margin-bottom:10px;">
			<p th:text="${error}"></p>
		</div>

        <form th:action="@{/alert/AlertRotationSettingConfirm}"
              th:object="${rotationSetting}"
              method="post"
              class="form-box">

            <!-- 対象期間 -->
            <div>
                <label>対象期間（日）</label><br>
                注意：直近
                <input type="number" th:field="*{attentionDays}" min="1" required>
                日間
                <br>
                緊急：直近
                <input type="number" th:field="*{urgentDays}" min="1" required>
                日間
                <br>
                <small>※指定した期間内の販売状況をもとに判定します</small>
            </div>

            <!-- 販売数基準 -->
            <div>
                <label>販売数基準</label><br>
                注意：上記期間内の販売数が
                <input type="number" th:field="*{attentionSales}" min="1" required>
                以下
                <br>
                緊急：上記期間内の販売数が
                <input type="number" th:field="*{urgentSales}" min="1" required>
                以下
                <br>
                <small>※日数と販売数から1日あたりの平均販売数を計算して判定します</small>
            </div>

            <!-- 対象商品 -->
            <div>
                <label>対象商品</label><br>
                通常販売中の商品を対象とします（販売停止・販売終了は除外）
            </div>
			
			<div class="button-area">
			
				<button type="submit" class="btn-confirm">
				   確認画面へ
				</button>
	
	            <button type="button" 
				onclick="location.href='/alert/AlertSetting'"
				class="btn-back">
	               戻る
	            </button>
			</div>

            
            

        </form>

    </div>

</body>
</html>
