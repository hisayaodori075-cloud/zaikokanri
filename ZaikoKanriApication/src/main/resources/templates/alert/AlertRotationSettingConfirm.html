<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>回転アラート設定確認</title>
    <link rel="stylesheet" th:href="@{/alert/AlertRotationSettingConfirm.css}">
</head>

<body>

<div class="container">

    <h1>回転アラート設定確認</h1>

    <div class="setting-info">

        注意対象期間：
        <span th:text="${rotationSetting.attentionDays}"></span>日
        <br>

        注意販売数：
        <span th:text="${rotationSetting.attentionSales}"></span>個以下
        <br><br>

        緊急対象期間：
        <span th:text="${rotationSetting.urgentDays}"></span>日
        <br>

        緊急販売数：
        <span th:text="${rotationSetting.urgentSales}"></span>個以下
        <br><br>

    </div>

    <form th:action="@{/alert/AlertRotationSettingComplete}"
          method="post"
          th:object="${rotationSetting}">

        <input type="hidden" th:field="*{attentionDays}">
        <input type="hidden" th:field="*{attentionSales}">
        <input type="hidden" th:field="*{urgentDays}">
        <input type="hidden" th:field="*{urgentSales}">

        <button type="submit">
            登録する
        </button>

    </form>

    <br>

    <button type="button" onclick="history.back()">
        入力画面に戻る
    </button>

</div>

</body>
</html>
