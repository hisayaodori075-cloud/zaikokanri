<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>廃棄商品検索</title>
    <link rel="stylesheet" th:href="@{/stock/DisposalRegister.css}">
</head>

<body>

<div class="container">

    <h1>廃棄商品検索</h1>

    <div class="back-area">
        <a th:href="@{/stock/ZaikoConfirm}">
            <button type="button">戻る</button>
        </a>
    </div>

    <form th:action="@{/stock/DisposalRegister}" method="get" class="search-form">

        <label>商品名</label>
        <select name="productId">
            <option value="">商品名を選択してください</option>
            <option th:each="product : ${productList}"
                    th:value="${product.id}"
                    th:text="${product.productName}">
            </option>
        </select>

        <label>JANコード</label>
        <input type="text" name="janCode">

        <div class="button-area">
            <button type="submit">検索</button>

            <button type="button"
                    onclick="location.href='/stock/DisposalRegister'">
                一覧
            </button>
        </div>

    </form>

    <table class="product-table">

        <thead>
            <tr>
                <th>JANコード</th>
                <th>商品ID</th>
                <th>商品名</th>
                <th>在庫数</th>
                <th>操作</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="product : ${productList}">

                <td th:text="${product.janCode}"></td>
                <td th:text="${product.id}"></td>
                <td th:text="${product.productName}"></td>
                <td th:text="${product.stock}"></td>

                <td>
                    <a th:href="@{/stock/DisposalInput/{id}(id=${product.id})}">
                        廃棄登録へ
                    </a>
                </td>

            </tr>

        </tbody>

    </table>

</div>

</body>
</html>
