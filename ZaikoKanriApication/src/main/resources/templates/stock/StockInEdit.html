<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>入荷処理編集</title>
    <link rel="stylesheet" th:href="@{/stock/StockInEdit.css}">
</head>

<body>

<div class="container">

    <h1>入荷処理編集</h1>

    <div class="back-area">
        <a th:href="@{/stock/StockInEditSearch}">
            <button type="button">
                戻る
            </button>
        </a>
    </div>

    <form th:action="@{/stock/StockInEditConfirm}"
          th:object="${stock}"
          method="post"
          class="form-box">

        <!-- ID -->
        <label>ID</label>
        <input type="text" th:field="*{id}" readonly>

        <!-- 商品 -->
        <label>商品</label>
        <select th:field="*{productId}">
            <option th:each="product : ${productList}"
                    th:value="${product.id}"
                    th:text="${product.productName}">
            </option>
        </select>

        <!-- 入荷数 -->
        <label>入荷数</label>
        <input type="text" th:field="*{quantity}" placeholder="入荷数"
		required>

        <!-- 入荷日 -->
        <label>入荷日</label>
        <input type="date" th:field="*{arrivalDate}"
		required>

        <div class="button-area">
            <button type="submit">
                入荷処理編集確認へ
            </button>
        </div>

    </form>

</div>

</body>
</html>
