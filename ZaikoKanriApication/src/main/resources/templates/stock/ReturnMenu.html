<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>返品管理</title>
    <link rel="stylesheet" th:href="@{/stock/ReturnMenu.css}">
</head>

<body>

<div class="container">

    <h2>返品管理</h2>

    <div class="button-area">

        <!-- 返品登録 -->
        <form th:action="@{/stock/ReturnRegister}" method="get">
            <button type="submit">
                返品登録
            </button>
        </form>

        <!-- 返品削除 -->
        <form th:action="@{/stock/ReturnDeleteSearch}" method="get">
            <button type="submit">
                返品削除
            </button>
        </form>
		
		<!-- 返品一覧 -->
		<form th:action="@{/stock/ReturnList}" method="get">
		     <button type="submit">
		        返品一覧
		     </button>
		</form>

        <!-- 戻る -->
        <form th:action="@{/stock/ZaikoKanri}" method="get">
            <button type="submit">
                在庫管理へ戻る
            </button>
        </form>

    </div>

</div>

</body>
</html>
