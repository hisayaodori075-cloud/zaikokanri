<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>廃棄削除検索</title>
    <link rel="stylesheet" th:href="@{/stock/DisposalDeleteSearch.css}"> <!-- EditSearchのCSSを流用 -->
</head>

<body>

<div class="container">

    <h1>廃棄削除検索</h1>

	<!-- エラーメッセージ -->
	<div th:if="${errorMessage}" style="color:red; margin-bottom:10px;">
		<p th:text="${errorMessage}"></p>
	</div>

    <div class="button-area">
        <a th:href="@{/stock/DisposalMenu}">
            <button type="button">戻る</button>
        </a>
    </div>

    <form th:action="@{/stock/DisposalDeleteConfirm}" method="post" class="form-box">

        <label>廃棄ID</label>
        <input type="number" name="disposalId" required>

        <div class="button-area">
            <button type="submit">検索</button>
        </div>

    </form>

</div>

</body>
</html>
