<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>入荷削除確認</title>
    <link rel="stylesheet" th:href="@{/stock/StockInDeleteConfirm.css}">
</head>

<body>

<div class="container">

    <h2>入荷削除確認</h2>

    <div class="info-box">

        <p>入荷ID: <span th:text="${stock.id}"></span></p>
        <p>商品名: <span th:text="${product.productName}"></span></p>
        <p>入荷数: <span th:text="${stock.quantity}"></span></p>
        <p>入荷日: <span th:text="${stock.arrivalDate}"></span></p>

    </div>

    <div class="button-area">

        <!-- 削除確定 -->
        <form th:action="@{/stock/StockInDeleteComplete}" th:object="${stock}" method="post">
            <input type="hidden" th:field="*{id}">
            <button type="submit">削除する</button>
        </form>

        <!-- 戻る -->
        <form th:action="@{/stock/StockInDeleteSearch}" method="get">
            <button type="submit">戻る</button>
        </form>

    </div>

</div>

</body>
</html>
