<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>入荷処理編集完了</title>
    <link rel="stylesheet" th:href="@{/stock/StockInEditComplete.css}">
</head>

<body>

<div class="container">

    <h2>入荷処理編集が完了しました</h2>

    <div class="button-area">

        <form th:action="@{/stock/StockInEditSearch}" method="get">
            <button type="submit">
                入荷処理登録修正を続ける
            </button>
        </form>

        <form th:action="@{/stock/ArrivalControll}" method="get">
            <button type="submit">
                入荷処理編集へ戻る
            </button>
        </form>

    </div>

</div>

</body>
</html>
