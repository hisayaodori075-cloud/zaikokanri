<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>在庫調整管理</title>
    <link rel="stylesheet" th:href="@{/stock/ZaikoConfirm.css}">
</head>

<body>

<div class="container">

    <h1>在庫調整管理</h1>

    <div class="button-area">

        <!-- 廃棄 -->
        <form th:action="@{/stock/DisposalMenu}" method="get">
            <button type="submit">
                廃棄管理
            </button>
        </form>

        <!-- 返品 -->
        <form th:action="@{/stock/ReturnMenu}" method="get">
            <button type="submit">
                返品管理
            </button>
        </form>

        <!-- 棚卸差異 -->
        <form th:action="@{/stock/StockTakeMenu}" method="get">
            <button type="submit">
                棚卸管理
            </button>
        </form>

        <!-- 戻る -->
        <form th:action="@{/stock/ZaikoKanri}" method="get">
            <button type="submit">
                在庫管理へ戻る
            </button>
        </form>

    </div>

</div>

</body>
</html>
