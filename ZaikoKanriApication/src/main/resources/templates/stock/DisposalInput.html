<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
	<title>廃棄商品入力</title>
	<link rel="stylesheet" th:href="@{/stock/DisposalInput.css}">
</head>

<body>

    <div class="container">

		<h1>廃棄商品入力</h1>

		<div th:if="${errorMessage}" style="color:red; margin-bottom:10px;">
		    <p th:text="${errorMessage}"></p>
		</div>
		
		<div class="product-info">

            <p>商品名: <span th:text="${product.productName}"></span></p>
            <p>JANコード: <span th:text="${product.janCode}"></span></p>

        </div>

		<form th:action="@{/stock/DisposalConfirm}"
		      th:object="${disposal}"
              method="post"
              class="form-box">

            <!-- ★ここ重要 -->
			<input type="hidden" th:field="*{productId}" th:value="${product.id}">

			<label>廃棄数</label>
			<input type="number" th:field="*{quantity}" min="1" required>

			<label>廃棄日</label>
			<input type="date" th:field="*{disposalDate}" required>
			
			<!-- ★追加：廃棄理由 -->
			<label>廃棄理由</label>
			<select th:field="*{reason}" required>
			    <option value="">選択してください</option>
			    <option value="賞味期限切れ">賞味期限切れ</option>
			    <option value="破損">破損</option>
			    <option value="不良品">不良品</option>
			    <option value="その他">その他</option>
			</select>

            <div class="button-area">
                <button type="submit">
					廃棄登録内容確認へ
                </button>
            </div>

        </form>

        <div class="back-area">
			<a th:href="@{/stock/DisposalRegister}">
                <button type="button">戻る</button>
            </a>
        </div>

    </div>

</body>
</html>
