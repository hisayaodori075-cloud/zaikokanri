<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>入荷処理登録削除検索</title>
    <link rel="stylesheet" th:href="@{/stock/StockInDeleteSearch.css}">
</head>

<body>

<div class="container">

    <h1>入荷処理登録削除検索</h1>

    <p class="error-message"
       th:if="${errorMessage}"
       th:text="${errorMessage}">
    </p>

    <div class="button-area">
        <a th:href="@{/stock/ArrivalControll}">
            <button type="button">
                戻る
            </button>
        </a>
    </div>

    <form th:action="@{/stock/StockInDeleteConfirm}" method="post">

        <div class="form-box">

            <label>入荷ID</label>
            <input type="number" name="id" required>

        </div>

        <div class="button-area">
            <button type="submit">
                検索
            </button>
        </div>

    </form>

</div>

</body>
</html>
