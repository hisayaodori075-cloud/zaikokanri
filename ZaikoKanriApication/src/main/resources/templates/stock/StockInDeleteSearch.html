<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>入荷処理削除検索</title>
    <link rel="stylesheet" th:href="@{/stock/StockInDeleteSearch.css}">
</head>

<body>

<div class="container">

    <h1>入荷処理削除検索</h1>

	<!-- エラーメッセージ -->
	<div th:if="${errorMessage}" style="color:red; margin-bottom:10px;">
		<p th:text="${errorMessage}"></p>
	</div>

    

    <form th:action="@{/stock/StockInDeleteConfirm}" method="post" class="form-box">

        <div class="form-box">

            <label>入荷IDを入力してください</label>
            <input type="number" name="id" required>

        </div>

        <div class="button-area">
            <button type="submit">
                検索
            </button>
        </div>
		
		<div class="back-area">
		    <a th:href="@{/stock/ArrivalControll}">
		       <button type="button">
		          戻る
		       </button>
		    </a>
		</div>

    </form>

</div>

</body>
</html>
