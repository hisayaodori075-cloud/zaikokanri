<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>廃棄内容確認</title>
    <link rel="stylesheet" th:href="@{/stock/DisposalConfirm.css}">
</head>

<body>

    <div class="container">

        <h2>廃棄内容確認</h2>

        <div class="info-box">

            <!-- 商品情報 -->
            <p>商品名: <span th:text="${product.productName}"></span></p>
            <p>JANコード: <span th:text="${product.janCode}"></span></p>

            <!-- 廃棄情報 -->
            <p>廃棄数: <span th:text="${disposal.quantity}"></span></p>
            <p>廃棄日: <span th:text="${disposal.disposalDate}"></span></p>
		    <p>廃棄理由: <span th:text="${disposal.reason}"></span></p>

        </div>

        <div class="button-area">

            <!-- 登録 -->
            <form th:action="@{/stock/DisposalSave}" th:object="${disposal}" method="post">

                <input type="hidden" th:field="*{productId}" th:value="${product.id}">
                <input type="hidden" th:field="*{quantity}">
                <input type="hidden" th:field="*{disposalDate}">
				<input type="hidden" th:field="*{reason}">

                <button type="submit">
                    登録する
                </button>

            </form>

            <!-- 戻る -->
            <form th:action="@{/stock/DisposalInput}" th:object="${disposal}" method="post">

                <input type="hidden" th:field="*{productId}">
                <input type="hidden" th:field="*{quantity}">
                <input type="hidden" th:field="*{disposalDate}">
			    <input type="hidden" th:field="*{reason}">

                <button type="submit">
                    戻る
                </button>

            </form>

        </div>

    </div>

</body>
</html>
