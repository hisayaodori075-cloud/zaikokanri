<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>入荷処理編集確認</title>
    <link rel="stylesheet" th:href="@{/stock/StockInEditConfirm.css}">
</head>

<body>

<div class="container">

    <h1>入荷処理編集確認</h1>

    <!-- 確認表示（th:objectをここに置くのがポイント） -->
    <div class="form-box" th:object="${stock}">

        <!-- 入荷ID -->
        <label>入荷ID</label>
        <span th:text="*{id}"></span>
        <input type="hidden" th:field="*{id}">

        <!-- 商品名 -->
        <label>商品名</label>
        <span th:text="${product.productName}"></span>
        <input type="hidden" th:field="*{productId}">

        <!-- 入荷数 -->
        <label>入荷数</label>
        <span th:text="*{quantity}"></span>
        <input type="hidden" th:field="*{quantity}">

        <!-- 入荷日 -->
        <label>入荷日</label>
        <span th:text="*{arrivalDate}"></span>
        <input type="hidden" th:field="*{arrivalDate}">

    </div>

    <div class="button-area">

        <!-- 更新ボタン -->
        <form th:action="@{/stock/save}" th:object="${stock}" method="post">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{productId}">
            <input type="hidden" th:field="*{quantity}">
            <input type="hidden" th:field="*{arrivalDate}">
            <button type="submit">更新</button>
        </form>

        <!-- 戻るボタン（GETで編集画面へ） -->
        <form th:action="@{/stock/StockInEditBack/{id}(id=${stock.id})}" method="get">
            <button type="submit">戻る</button>
        </form>

    </div>

</div>

</body>
</html>
