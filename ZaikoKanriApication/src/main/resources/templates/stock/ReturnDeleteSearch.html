<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>返品処理削除検索</title>
    <link rel="stylesheet" th:href="@{/stock/ReturnDeleteSearch.css}">
</head>

<body>

<div class="container">

    <h1>返品処理削除検索</h1>

    <!-- エラーメッセージ -->
    <div th:if="${errorMessage}" style="color:red; margin-bottom:10px;">
        <p th:text="${errorMessage}"></p>
    </div>

    

    <form th:action="@{/stock/ReturnDeleteConfirm}" method="post" class="form-box">

        <div class="form-box">

            <label>返品IDを入力してください</label>
            <input type="number" name="returnId" required>

        </div>

        <div class="button-area">
            <button type="submit">
                検索
            </button>
        </div>
		
		<!-- 戻る -->
		<div class="back-area">
		   <a th:href="@{/stock/ReturnMenu}">
		      <button type="button">
		         戻る
		      </button>
		   </a>
		</div>

    </form>

</div>

</body>
</html>
