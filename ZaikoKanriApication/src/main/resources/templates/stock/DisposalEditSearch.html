<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>廃棄処理編集検索</title>
    <link rel="stylesheet" th:href="@{/stock/DisposalEditSearch.css}">
</head>

<body>

<div class="container">

    <h1>廃棄処理編集検索</h1>

	<div th:if="${errorMessage}" style="color:red; margin-bottom:10px;">
		<p th:text="${errorMessage}"></p>
	</div>

    

    <form th:action="@{/stock/DisposalEdit}" method="post" class="form-box">

        <label>廃棄IDを入力してください</label>
        <input type="number" name="disposalId" required>

        <div class="button-area">
            <button type="submit">
                検索
            </button>
        </div>
		
		<div class="back-area">
		    <a th:href="@{/stock/DisposalMenu}">
		    		<button type="button">
		           戻る
		         </button>
		    </a>
		</div>

    </form>

</div>

</body>
</html>
