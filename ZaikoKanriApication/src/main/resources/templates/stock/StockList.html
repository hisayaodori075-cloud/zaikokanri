<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>在庫管理一覧</title>
    <link rel="stylesheet" th:href="@{/stock/StockList.css}">
</head>

<body>

<div class="container">

    <h1>在庫管理一覧</h1>

    <!-- 戻るボタン（上に移動） -->
    <div class="back-area">
        <a th:href="@{/stock/ZaikoKanri}">
            <button type="button">戻る</button>
        </a>
    </div>

    <!-- エラーメッセージ（位置統一） -->
    <div th:if="${errorMessage}" style="color:red; margin-bottom:10px;">
        <p th:text="${errorMessage}"></p>
    </div>

    <!-- 検索フォーム -->
    <form th:action="@{/stock/StockList}" method="get" class="search-form">

        <label>商品名</label>
        <select name="productId">
            <option value="">商品名を選択してください</option>

            <option th:each="product : ${allProducts}"
                    th:value="${product.id}"
                    th:text="${product.productName}"
                    th:selected="${product.id == param.productId}">
            </option>
        </select>

        <label>JANコード</label>
        <input type="text" name="janCode">

        <div class="button-area">
            <button type="submit">検索</button>

            <button type="button"
                    onclick="location.href='/stock/StockList'">
                一覧
            </button>
        </div>

    </form>

    <!-- 在庫一覧表（クラス名統一） -->
    <table class="product-table">

        <thead>
            <tr>
                <th>商品ID</th>
                <th>商品名</th>
                <th>JANコード</th>
                <th>在庫数</th>
                <th>在庫ステータス</th>
                <th>販売状況</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="product : ${productList}">
                <td th:text="${product.id}"></td>
                <td th:text="${product.productName}"></td>
                <td th:text="${product.janCode}"></td>
                <td th:text="${product.stock}"></td>

                <td th:text="${product.status}"
                    th:classappend="${product.status == '少ない'} ? 'low' : (product.status == '多い' ? 'high' : 'normal')">
                </td>

                <td th:text="${product.salesStatus}"></td>
            </tr>

        </tbody>

    </table>

</div>

</body>
</html>
