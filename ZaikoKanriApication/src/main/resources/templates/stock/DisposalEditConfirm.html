<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>廃棄処理編集確認</title>
    <link rel="stylesheet" th:href="@{/stock/DisposalEditConfirm.css}">
</head>

<body>

<div class="container">

    <h1>廃棄処理編集確認</h1>

    <!-- 確認用の表示 -->
    <div class="form-box" th:object="${disposal}">

        <!-- 廃棄ID -->
        <p>廃棄ID</p>
        <span th:text="*{id}"></span>
        <input type="hidden" th:field="*{id}">

        <!-- 商品名 -->
        <p>商品名</p>
        <span th:text="${product.productName}"></span>
        <input type="hidden" th:field="*{productId}">

        <!-- 廃棄数 -->
        <p>廃棄数</p>
        <span th:text="*{quantity}"></span>
        <input type="hidden" th:field="*{quantity}">

        <!-- 廃棄日 -->
        <p>廃棄日</p>
        <span th:text="*{disposalDate}"></span>
        <input type="hidden" th:field="*{disposalDate}">
		
		<!-- 廃棄理由 -->
		<p>廃棄理由</p>
		<span th:text="*{reason}"></span>
		<input type="hidden" th:field="*{reason}">

    </div>

    <div class="button-area">
        <!-- 保存ボタン -->
        <form th:action="@{/stock/DisposalEditSave}" th:object="${disposal}" method="post">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{productId}">
            <input type="hidden" th:field="*{quantity}">
            <input type="hidden" th:field="*{disposalDate}">
			<input type="hidden" th:field="*{reason}">
            <button type="submit">更新する</button>
        </form>

        <!-- 戻るボタン -->
        <form th:action="@{/stock/DisposalEditBack/{id}(id=${disposal.id})}" method="get">
            <button type="submit">戻る</button>
        </form>
    </div>

</div>

</body>
</html>
